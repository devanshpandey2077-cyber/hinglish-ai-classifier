services:
  - type: web
    name: hinglish-abuse-detector-api
    runtime: python
    pythonVersion: 3.11
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port 8000"
    rootDir: backend
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
